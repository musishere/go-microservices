syntax = "proto3";

option go_package = "github.com/musishere/grpc/protos/currency";

service Currency {
    rpc GetRate(RateRequest) returns (RateResponse);
}

message RateRequest {
    Currencies Base = 1;
    Currencies Destination = 2;
}

message RateResponse {
    float Rate = 1;
}

enum Currencies {
    UNSPECIFIED = 0;  // default / unset

    // Major Global
    USD = 1;   // US Dollar
    EUR = 2;   // Euro
    GBP = 3;   // British Pound
    JPY = 4;   // Japanese Yen
    CHF = 5;   // Swiss Franc

    // Asia Pacific
    CNY = 6;   // Chinese Yuan
    INR = 7;   // Indian Rupee
    KRW = 8;   // South Korean Won
    SGD = 9;   // Singapore Dollar
    AUD = 10;  // Australian Dollar
    NZD = 11;  // New Zealand Dollar
    HKD = 12;  // Hong Kong Dollar

    // Middle East & Africa
    AED = 13;  // UAE Dirham
    SAR = 14;  // Saudi Riyal
    PKR = 15;  // Pakistani Rupee
    ZAR = 16;  // South African Rand
    EGP = 17;  // Egyptian Pound
    QAR = 18;  // Qatari Riyal

    // Americas
    CAD = 19;  // Canadian Dollar
    BRL = 20;  // Brazilian Real
    MXN = 21;  // Mexican Peso
    ARS = 22;  // Argentine Peso

    // Europe (non-Euro)
    SEK = 23;  // Swedish Krona
    NOK = 24;  // Norwegian Krone
    DKK = 25;  // Danish Krone
    PLN = 26;  // Polish Zloty
    TRY = 27;  // Turkish Lira
}